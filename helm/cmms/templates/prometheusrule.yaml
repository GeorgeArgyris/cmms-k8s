apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cmms-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack  
spec:
  groups:
    - name: cmms.backend
      interval: 30s
      rules:
        - alert: HighErrorRate
          expr: |
            sum(rate(http_requests_total{status_code=~"5.."}[5m]))
            /
            sum(rate(http_requests_total[5m])) > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "High error rate detected"
            description: "More than 5% of requests are returning 5xx errors for the last 5 minutes."

        - alert: HighLatency
          expr: |
            histogram_quantile(0.99,
              sum(rate(http_request_duration_seconds_bucket[5m])) by (le)
            ) > 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High p99 latency"
            description: "p99 latency is above 1 second for the last 5 minutes."

        - alert: BackendDown
          expr: |
            kube_deployment_status_replicas_available{
              deployment="backend",
              namespace="cmms"
            } == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Backend is down"
            description: "The backend deployment has 0 available replicas."

        - alert: PodRestartingTooMuch
          expr: |
            increase(kube_pod_container_status_restarts_total{
              namespace="cmms"
            }[1h]) > 3
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod restarting frequently"
            description: "A pod in the cmms namespace has restarted more than 3 times in the last hour."