<script>
  if (!sessionStorage.getItem('cmms_token')) {
    window.location.replace('../index.html');
  }
</script>
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMMS — Work Orders</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../css/main.css" rel="stylesheet">
</head>

<body data-page="work-orders">
  <div class="page-wrapper">

    <!-- SIDEBAR -->
    <div id="sidebar-container"></div>

    <!-- MAIN -->
    <div class="d-flex flex-column flex-grow-1">
      <div class="topbar">
        <span class="page-title">Work Orders</span>
        <button class="btn btn-primary btn-sm" onclick="openAddModal()">
          <i class="bi bi-plus-circle me-1"></i> New Work Order
        </button>
      </div>

      <div class="page-content">

        <!-- FILTERS -->
        <div class="cmms-card p-3 mb-3">
          <div class="row g-2 align-items-end">
            <div class="col-md-4">
              <label class="form-label" style="font-size:12px;color:#6c757d">Search</label>
              <input type="text" id="search" class="form-control form-control-sm"
                placeholder="Search by title or asset...">
            </div>
            <div class="col-md-2">
              <label class="form-label" style="font-size:12px;color:#6c757d">Status</label>
              <select id="filter-status" class="form-select form-select-sm">
                <option value="">All</option>
                <option value="open">Open</option>
                <option value="in_progress">In Progress</option>
                <option value="done">Done</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </div>
            <div class="col-md-2">
              <label class="form-label" style="font-size:12px;color:#6c757d">Priority</label>
              <select id="filter-priority" class="form-select form-select-sm">
                <option value="">All</option>
                <option value="critical">Critical</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
              </select>
            </div>
            <div class="col-md-2">
              <button class="btn btn-sm w-100" style="background:#2d3139;color:#adb5bd" onclick="resetFilters()">
                <i class="bi bi-x-circle me-1"></i>Reset
              </button>
            </div>
          </div>
        </div>

        <!-- TABLE -->
        <div class="cmms-card p-3">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <span style="font-size:13px;color:#6c757d" id="wo-count">Loading...</span>
          </div>
          <div class="table-responsive">
            <table class="table table-dark-cmms table-hover align-middle mb-0">
              <thead>
                <tr style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#6c757d">
                  <th class="border-0 pb-2">Title</th>
                  <th class="border-0 pb-2">Asset</th>
                  <th class="border-0 pb-2">Assigned To</th>
                  <th class="border-0 pb-2">Priority</th>
                  <th class="border-0 pb-2">Status</th>
                  <th class="border-0 pb-2">Due Date</th>
                  <th class="border-0 pb-2">Actions</th>
                </tr>
              </thead>
              <tbody id="wo-body" style="font-size:13px">
                <tr>
                  <td colspan="7" class="text-center py-4" style="color:#6c757d">Loading...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ADD/EDIT MODAL -->
  <div class="modal fade" id="woModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title text-white" id="modal-title">New Work Order</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="wo-id">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label" style="font-size:12px;color:#adb5bd">Title *</label>
              <input type="text" id="f-title" class="form-control"
                placeholder="e.g. Replace air filter on Compressor A-01">
            </div>
            <div class="col-12">
              <label class="form-label" style="font-size:12px;color:#adb5bd">Description</label>
              <textarea id="f-desc" class="form-control" rows="3"
                placeholder="Detailed instructions or findings..."></textarea>
            </div>
            <div class="col-md-6">
              <label class="form-label" style="font-size:12px;color:#adb5bd">Asset</label>
              <select id="f-asset" class="form-select">
                <option value="">Select asset</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label" style="font-size:12px;color:#adb5bd">Assign To</label>
              <select id="f-assigned" class="form-select">
                <option value="">Unassigned</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label" style="font-size:12px;color:#adb5bd">Priority</label>
              <select id="f-priority" class="form-select">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
                <option value="critical">Critical</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label" style="font-size:12px;color:#adb5bd">Status</label>
              <select id="f-status" class="form-select">
                <option value="open">Open</option>
                <option value="in_progress">In Progress</option>
                <option value="done">Done</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label" style="font-size:12px;color:#adb5bd">Due Date</label>
              <input type="date" id="f-due" class="form-control">
            </div>
          </div>
          <div id="modal-error" class="alert alert-danger mt-3 d-none"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-sm" style="background:#2d3139;color:#adb5bd"
            data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary btn-sm" onclick="saveWO()">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- DETAIL MODAL -->
  <div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title text-white" id="detail-title">Work Order Detail</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="detail-body" style="font-size:13px;color:#adb5bd">
          Loading...
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-sm" style="background:#2d3139;color:#adb5bd"
            data-bs-dismiss="modal">Close</button>
          <button type="button" class="btn btn-primary btn-sm" id="detail-edit-btn">Edit</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    requireAuth();
    loadSidebarComponent();

    let allWOs = [];
    let assets = [];
    let users = [];

    const statusMap = {
      open: { bg: '#1a3a5c', color: '#60a5fa', label: 'Open' },
      in_progress: { bg: '#3a2a00', color: '#fbbf24', label: 'In Progress' },
      done: { bg: '#0d2d1a', color: '#34d399', label: 'Done' },
      cancelled: { bg: '#2a1a1a', color: '#f87171', label: 'Cancelled' }
    };
    const priorityMap = {
      critical: { bg: '#3a0a0a', color: '#f87171' },
      high: { bg: '#3a2a00', color: '#fbbf24' },
      medium: { bg: '#1a2a3a', color: '#60a5fa' },
      low: { bg: '#1a2a1a', color: '#6ee7b7' }
    };

    function statusBadge(s) {
      const m = statusMap[s] || { bg: '#2d3139', color: '#adb5bd', label: s };
      return `<span class="badge rounded-pill px-2" style="background:${m.bg};color:${m.color};font-size:11px">${m.label}</span>`;
    }
    function priorityBadge(p) {
      const m = priorityMap[p] || { bg: '#2d3139', color: '#adb5bd' };
      return `<span class="badge rounded-pill px-2" style="background:${m.bg};color:${m.color};font-size:11px">${p}</span>`;
    }
    function formatDate(d) {
      if (!d) return '—';
      const date = new Date(d);
      const diff = Math.ceil((date - new Date()) / (1000 * 60 * 60 * 24));
      const str = date.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
      if (diff < 0) return `<span class="text-danger">${str} ⚠</span>`;
      if (diff === 0) return `<span class="text-warning">${str} (today)</span>`;
      return str;
    }

    async function loadMeta() {
      const [aRes, uRes] = await Promise.all([
        apiFetch('/assets'),
        apiFetch('/users').catch(() => ({ json: () => [] }))
      ]);
      assets = await aRes.json();
      try { users = await uRes.json(); } catch { users = []; }

      const aSel = document.getElementById('f-asset');
      assets.forEach(a => {
        const o = document.createElement('option');
        o.value = a.id; o.textContent = a.name;
        aSel.appendChild(o);
      });

      const uSel = document.getElementById('f-assigned');
      users.forEach(u => {
        const o = document.createElement('option');
        o.value = u.id; o.textContent = u.name;
        uSel.appendChild(o);
      });
    }

    async function loadWOs() {
      try {
        const res = await apiFetch('/work-orders');
        allWOs = await res.json();
        renderTable(allWOs);
      } catch {
        document.getElementById('wo-body').innerHTML =
          `<tr><td colspan="7" class="text-center py-4 text-danger">Failed to load</td></tr>`;
      }
    }

    function renderTable(wos) {
      document.getElementById('wo-count').textContent = `${wos.length} work order${wos.length !== 1 ? 's' : ''}`;
      const tbody = document.getElementById('wo-body');
      if (!wos.length) {
        tbody.innerHTML = `<tr><td colspan="7" class="text-center py-4" style="color:#6c757d">No work orders found</td></tr>`;
        return;
      }
      tbody.innerHTML = wos.map(wo => `
      <tr style="cursor:pointer">
        <td class="text-white" onclick="openDetail(${wo.id})">${wo.title}</td>
        <td style="color:#adb5bd" onclick="openDetail(${wo.id})">${wo.asset_name || '—'}</td>
        <td style="color:#adb5bd" onclick="openDetail(${wo.id})">${wo.assigned_name || '<span style="color:#4a5568">Unassigned</span>'}</td>
        <td onclick="openDetail(${wo.id})">${priorityBadge(wo.priority)}</td>
        <td onclick="openDetail(${wo.id})">${statusBadge(wo.status)}</td>
        <td style="font-size:12px" onclick="openDetail(${wo.id})">${formatDate(wo.due_date)}</td>
        <td>
          <button class="btn btn-sm me-1" style="background:#2d3139;color:#adb5bd;font-size:12px" onclick="openEditModal(${wo.id})">
            <i class="bi bi-pencil"></i>
          </button>
        </td>
      </tr>
    `).join('');
    }

    function applyFilters() {
      const search = document.getElementById('search').value.toLowerCase();
      const status = document.getElementById('filter-status').value;
      const priority = document.getElementById('filter-priority').value;
      const filtered = allWOs.filter(wo => {
        const matchSearch = !search || wo.title.toLowerCase().includes(search) || (wo.asset_name || '').toLowerCase().includes(search);
        const matchStatus = !status || wo.status === status;
        const matchPriority = !priority || wo.priority === priority;
        return matchSearch && matchStatus && matchPriority;
      });
      renderTable(filtered);
    }

    function resetFilters() {
      document.getElementById('search').value = '';
      document.getElementById('filter-status').value = '';
      document.getElementById('filter-priority').value = '';
      renderTable(allWOs);
    }

    document.getElementById('search').addEventListener('input', applyFilters);
    document.getElementById('filter-status').addEventListener('change', applyFilters);
    document.getElementById('filter-priority').addEventListener('change', applyFilters);

    function openAddModal() {
      document.getElementById('modal-title').textContent = 'New Work Order';
      document.getElementById('wo-id').value = '';
      document.getElementById('f-title').value = '';
      document.getElementById('f-desc').value = '';
      document.getElementById('f-asset').value = '';
      document.getElementById('f-assigned').value = '';
      document.getElementById('f-priority').value = 'medium';
      document.getElementById('f-status').value = 'open';
      document.getElementById('f-due').value = '';
      document.getElementById('modal-error').classList.add('d-none');
      new bootstrap.Modal(document.getElementById('woModal')).show();

      // Auto-open if ?new=1
    }

    function openEditModal(id) {
      const wo = allWOs.find(x => x.id === id);
      if (!wo) return;
      document.getElementById('modal-title').textContent = 'Edit Work Order';
      document.getElementById('wo-id').value = wo.id;
      document.getElementById('f-title').value = wo.title;
      document.getElementById('f-desc').value = wo.description || '';
      document.getElementById('f-asset').value = wo.asset_id || '';
      document.getElementById('f-assigned').value = wo.assigned_to || '';
      document.getElementById('f-priority').value = wo.priority;
      document.getElementById('f-status').value = wo.status;
      document.getElementById('f-due').value = wo.due_date ? wo.due_date.split('T')[0] : '';
      document.getElementById('modal-error').classList.add('d-none');
      new bootstrap.Modal(document.getElementById('woModal')).show();
    }

    async function openDetail(id) {
      const modal = new bootstrap.Modal(document.getElementById('detailModal'));
      document.getElementById('detail-body').innerHTML = 'Loading...';
      modal.show();

      try {
        const res = await apiFetch(`/work-orders/${id}`);
        const wo = await res.json();
        document.getElementById('detail-title').textContent = wo.title;
        document.getElementById('detail-edit-btn').onclick = () => {
          bootstrap.Modal.getInstance(document.getElementById('detailModal')).hide();
          openEditModal(id);
        };
        document.getElementById('detail-body').innerHTML = `
        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <div style="font-size:11px;color:#6c757d;text-transform:uppercase;letter-spacing:.06em">Asset</div>
            <div class="mt-1 text-white">${wo.asset_name || '—'}</div>
          </div>
          <div class="col-md-6">
            <div style="font-size:11px;color:#6c757d;text-transform:uppercase;letter-spacing:.06em">Assigned To</div>
            <div class="mt-1 text-white">${wo.assigned_name || 'Unassigned'}</div>
          </div>
          <div class="col-md-4">
            <div style="font-size:11px;color:#6c757d;text-transform:uppercase;letter-spacing:.06em">Status</div>
            <div class="mt-1">${statusBadge(wo.status)}</div>
          </div>
          <div class="col-md-4">
            <div style="font-size:11px;color:#6c757d;text-transform:uppercase;letter-spacing:.06em">Priority</div>
            <div class="mt-1">${priorityBadge(wo.priority)}</div>
          </div>
          <div class="col-md-4">
            <div style="font-size:11px;color:#6c757d;text-transform:uppercase;letter-spacing:.06em">Due Date</div>
            <div class="mt-1">${formatDate(wo.due_date)}</div>
          </div>
          ${wo.description ? `
          <div class="col-12">
            <div style="font-size:11px;color:#6c757d;text-transform:uppercase;letter-spacing:.06em">Description</div>
            <div class="mt-1" style="line-height:1.7">${wo.description}</div>
          </div>` : ''}
        </div>
        <hr style="border-color:#2d3139">
        <div style="font-size:12px;font-weight:700;color:#adb5bd;margin-bottom:12px">COMMENTS (${wo.comments?.length || 0})</div>
        <div id="comments-list">
          ${wo.comments?.length ? wo.comments.map(c => `
            <div class="mb-3 p-3 rounded" style="background:#13161b;border:1px solid #2d3139">
              <div class="d-flex justify-content-between mb-1">
                <span class="fw-semibold text-white" style="font-size:13px">${c.user_name}</span>
                <span style="font-size:11px;color:#6c757d">${new Date(c.created_at).toLocaleString()}</span>
              </div>
              <div style="font-size:13px">${c.body}</div>
            </div>
          `).join('') : '<div style="color:#6c757d;font-size:13px">No comments yet</div>'}
        </div>
        <div class="mt-3 d-flex gap-2">
          <input type="text" id="new-comment" class="form-control form-control-sm" placeholder="Add a comment...">
          <button class="btn btn-primary btn-sm" onclick="addComment(${wo.id})">Post</button>
        </div>
      `;
      } catch {
        document.getElementById('detail-body').innerHTML = '<span class="text-danger">Failed to load</span>';
      }
    }

    async function addComment(woId) {
      const body = document.getElementById('new-comment').value.trim();
      if (!body) return;
      await apiFetch(`/work-orders/${woId}/comments`, {
        method: 'POST',
        body: JSON.stringify({ body })
      });
      openDetail(woId);
    }

    async function saveWO() {
      const id = document.getElementById('wo-id').value;
      const body = {
        title: document.getElementById('f-title').value.trim(),
        description: document.getElementById('f-desc').value.trim(),
        asset_id: document.getElementById('f-asset').value || null,
        assigned_to: document.getElementById('f-assigned').value || null,
        priority: document.getElementById('f-priority').value,
        status: document.getElementById('f-status').value,
        due_date: document.getElementById('f-due').value || null,
      };
      if (!body.title) {
        document.getElementById('modal-error').textContent = 'Title is required';
        document.getElementById('modal-error').classList.remove('d-none');
        return;
      }
      try {
        const res = await apiFetch(id ? `/work-orders/${id}` : '/work-orders', {
          method: id ? 'PATCH' : 'POST',
          body: JSON.stringify(body)
        });
        if (!res.ok) {
          const err = await res.json();
          document.getElementById('modal-error').textContent = err.error;
          document.getElementById('modal-error').classList.remove('d-none');
          return;
        }
        bootstrap.Modal.getInstance(document.getElementById('woModal')).hide();
        await loadWOs();
      } catch {
        document.getElementById('modal-error').textContent = 'Server error';
        document.getElementById('modal-error').classList.remove('d-none');
      }
    }

    // Auto-open new modal if ?new=1 in URL
    if (new URLSearchParams(window.location.search).get('new') === '1') {
      window.addEventListener('load', openAddModal);
    }

    loadMeta();
    loadWOs();
  </script>
</body>

</html>
