<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMMS — Assets</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../css/main.css" rel="stylesheet">
</head>

<body data-page="assets">
    <div class="page-wrapper">

        <!-- SIDEBAR -->
        <nav class="d-flex flex-column p-3"
            style="width:250px;min-height:100vh;background:#1a1d23;border-right:1px solid #2d3139;flex-shrink:0;">
            <div class="mb-4 px-2">
                <div class="text-uppercase fw-bold" style="font-size:11px;letter-spacing:.1em;color:#6c757d">CMMS</div>
                <div class="fw-bold fs-5 text-white mt-1">Maintenance</div>
            </div>
            <ul class="nav nav-pills flex-column gap-1">
                <li><a href="dashboard.html" class="nav-link sidebar-link" data-page="dashboard"><i
                            class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
                <li><a href="assets.html" class="nav-link sidebar-link" data-page="assets"><i
                            class="bi bi-boxes me-2"></i>Assets</a></li>
                <li><a href="work-orders.html" class="nav-link sidebar-link" data-page="work-orders"><i
                            class="bi bi-wrench-adjustable me-2"></i>Work Orders</a></li>
                <li><a href="schedule.html" class="nav-link sidebar-link" data-page="schedule"><i
                            class="bi bi-calendar3 me-2"></i>Schedule</a></li>
                <li class="admin-only" style="display:none"><a href="users.html" class="nav-link sidebar-link"
                        data-page="users"><i class="bi bi-people me-2"></i>Users</a></li>
            </ul>
            <div class="mt-auto pt-3 border-top" style="border-color:#2d3139!important">
                <div class="d-flex align-items-center gap-2 px-2 mb-2">
                    <div class="rounded-circle bg-primary d-flex align-items-center justify-content-center text-white fw-bold"
                        style="width:32px;height:32px;font-size:13px" id="user-avatar">?</div>
                    <div>
                        <div class="text-white fw-semibold" style="font-size:13px" id="user-name">Loading...</div>
                        <div style="font-size:11px;color:#6c757d" id="user-role"></div>
                    </div>
                </div>
                <button onclick="logout()" class="btn btn-sm w-100"
                    style="background:#2d3139;color:#adb5bd;border:none">
                    <i class="bi bi-box-arrow-left me-1"></i>Logout
                </button>
            </div>
        </nav>

        <!-- MAIN -->
        <div class="d-flex flex-column flex-grow-1">
            <div class="topbar">
                <span class="page-title">Assets</span>
                <button class="btn btn-primary btn-sm admin-only" style="display:none" onclick="openAddModal()">
                    <i class="bi bi-plus-circle me-1"></i> Add Asset
                </button>
            </div>

            <div class="page-content">

                <!-- FILTERS -->
                <div class="cmms-card p-3 mb-3">
                    <div class="row g-2 align-items-end">
                        <div class="col-md-4">
                            <label class="form-label" style="font-size:12px;color:#6c757d">Search</label>
                            <input type="text" id="search" class="form-control form-control-sm"
                                placeholder="Search by name, serial, model...">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label" style="font-size:12px;color:#6c757d">Status</label>
                            <select id="filter-status" class="form-select form-select-sm">
                                <option value="">All statuses</option>
                                <option value="active">Active</option>
                                <option value="inactive">Inactive</option>
                                <option value="under_maintenance">Under Maintenance</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label" style="font-size:12px;color:#6c757d">Category</label>
                            <select id="filter-category" class="form-select form-select-sm">
                                <option value="">All categories</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <button class="btn btn-sm w-100" style="background:#2d3139;color:#adb5bd"
                                onclick="resetFilters()">
                                <i class="bi bi-x-circle me-1"></i>Reset
                            </button>
                        </div>
                    </div>
                </div>

                <!-- TABLE -->
                <div class="cmms-card p-3">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span style="font-size:13px;color:#6c757d" id="asset-count">Loading...</span>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-dark-cmms table-hover align-middle mb-0">
                            <thead>
                                <tr style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#6c757d">
                                    <th class="border-0 pb-2">Asset</th>
                                    <th class="border-0 pb-2">Category</th>
                                    <th class="border-0 pb-2">Location</th>
                                    <th class="border-0 pb-2">Status</th>
                                    <th class="border-0 pb-2">Serial</th>
                                    <th class="border-0 pb-2 admin-only" style="display:none">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="assets-body" style="font-size:13px">
                                <tr>
                                    <td colspan="6" class="text-center py-4" style="color:#6c757d">Loading...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ADD/EDIT MODAL -->
    <div class="modal fade" id="assetModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title text-white" id="modal-title">Add Asset</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="asset-id">
                    <div class="row g-3">
                        <div class="col-md-8">
                            <label class="form-label" style="font-size:12px;color:#adb5bd">Asset Name *</label>
                            <input type="text" id="f-name" class="form-control"
                                placeholder="e.g. Air Compressor Unit A-01">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label" style="font-size:12px;color:#adb5bd">Status</label>
                            <select id="f-status" class="form-select">
                                <option value="active">Active</option>
                                <option value="inactive">Inactive</option>
                                <option value="under_maintenance">Under Maintenance</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" style="font-size:12px;color:#adb5bd">Serial Number</label>
                            <input type="text" id="f-serial" class="form-control" placeholder="SN-2024-001">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" style="font-size:12px;color:#adb5bd">Model</label>
                            <input type="text" id="f-model" class="form-control" placeholder="Manufacturer model">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" style="font-size:12px;color:#adb5bd">Category</label>
                            <select id="f-category" class="form-select">
                                <option value="">Select category</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" style="font-size:12px;color:#adb5bd">Location</label>
                            <select id="f-location" class="form-select">
                                <option value="">Select location</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" style="font-size:12px;color:#adb5bd">Purchase Date</label>
                            <input type="date" id="f-purchase" class="form-control">
                        </div>
                        <div class="col-12">
                            <label class="form-label" style="font-size:12px;color:#adb5bd">Notes</label>
                            <textarea id="f-notes" class="form-control" rows="2"
                                placeholder="Additional notes..."></textarea>
                        </div>
                    </div>
                    <div id="modal-error" class="alert alert-danger mt-3 d-none"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-sm" style="background:#2d3139;color:#adb5bd"
                        data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary btn-sm" onclick="saveAsset()">Save Asset</button>
                </div>
            </div>
        </div>
    </div>

    <!-- DELETE CONFIRM MODAL -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title text-white">Delete Asset</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" style="font-size:13px;color:#adb5bd">
                    Are you sure you want to delete this asset? This cannot be undone.
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-sm" style="background:#2d3139;color:#adb5bd"
                        data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger btn-sm" onclick="confirmDelete()">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        requireAuth();
        loadSidebar();

        let allAssets = [];
        let categories = [];
        let locations = [];
        let deleteId = null;

        const statusMap = {
            active: { bg: '#0d2d1a', color: '#34d399', label: 'Active' },
            inactive: { bg: '#2a1a1a', color: '#f87171', label: 'Inactive' },
            under_maintenance: { bg: '#3a2a00', color: '#fbbf24', label: 'Under Maintenance' }
        };

        function statusBadge(s) {
            const m = statusMap[s] || { bg: '#2d3139', color: '#adb5bd', label: s };
            return `<span class="badge rounded-pill px-2" style="background:${m.bg};color:${m.color};font-size:11px">${m.label}</span>`;
        }

        async function loadCategories() {
            const res = await apiFetch('/assets');
            // We'll just gather unique categories from assets
            // But better: load from a dedicated endpoint if you add one
            // For now populate from assets data
        }

        async function loadMeta() {
            // Load categories and locations for dropdowns
            // We'll fetch them from the assets list and extract unique values
            const res = await apiFetch('/assets');
            const data = await res.json();
            const cats = [...new Map(data.filter(a => a.category).map(a => [a.category_id, a.category])).entries()];
            const locs = [...new Map(data.filter(a => a.location).map(a => [a.location_id, a.location])).entries()];

            const catSels = [document.getElementById('filter-category'), document.getElementById('f-category')];
            catSels.forEach(sel => {
                cats.forEach(([id, name]) => {
                    const opt = document.createElement('option');
                    opt.value = id; opt.textContent = name;
                    sel.appendChild(opt.cloneNode(true));
                });
            });

            const locSel = document.getElementById('f-location');
            locs.forEach(([id, name]) => {
                const opt = document.createElement('option');
                opt.value = id; opt.textContent = name;
                locSel.appendChild(opt);
            });
        }

        async function loadAssets() {
            try {
                const res = await apiFetch('/assets');
                allAssets = await res.json();
                renderTable(allAssets);
            } catch (err) {
                document.getElementById('assets-body').innerHTML =
                    `<tr><td colspan="6" class="text-center py-4 text-danger">Failed to load assets</td></tr>`;
            }
        }

        function renderTable(assets) {
            document.getElementById('asset-count').textContent = `${assets.length} asset${assets.length !== 1 ? 's' : ''}`;
            const user = getUser();
            const isAdmin = user?.role === 'admin';
            const tbody = document.getElementById('assets-body');

            if (!assets.length) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4" style="color:#6c757d">No assets found</td></tr>`;
                return;
            }

            tbody.innerHTML = assets.map(a => `
      <tr>
        <td>
          <div class="fw-semibold text-white">${a.name}</div>
          <div style="font-size:11px;color:#6c757d">${a.model || '—'}</div>
        </td>
        <td style="color:#adb5bd">${a.category || '—'}</td>
        <td style="color:#adb5bd">${a.location || '—'}</td>
        <td>${statusBadge(a.status)}</td>
        <td style="color:#6c757d;font-size:12px">${a.serial_number || '—'}</td>
        <td class="admin-only" style="${isAdmin ? '' : 'display:none'}">
          <button class="btn btn-sm me-1" style="background:#2d3139;color:#adb5bd;font-size:12px" onclick="openEditModal(${a.id})">
            <i class="bi bi-pencil"></i>
          </button>
          <button class="btn btn-sm" style="background:#3a0a0a;color:#f87171;font-size:12px" onclick="openDeleteModal(${a.id})">
            <i class="bi bi-trash"></i>
          </button>
        </td>
      </tr>
    `).join('');
        }

        function applyFilters() {
            const search = document.getElementById('search').value.toLowerCase();
            const status = document.getElementById('filter-status').value;
            const cat = document.getElementById('filter-category').value;

            const filtered = allAssets.filter(a => {
                const matchSearch = !search ||
                    a.name.toLowerCase().includes(search) ||
                    (a.serial_number || '').toLowerCase().includes(search) ||
                    (a.model || '').toLowerCase().includes(search);
                const matchStatus = !status || a.status === status;
                const matchCat = !cat || String(a.category_id) === cat;
                return matchSearch && matchStatus && matchCat;
            });
            renderTable(filtered);
        }

        function resetFilters() {
            document.getElementById('search').value = '';
            document.getElementById('filter-status').value = '';
            document.getElementById('filter-category').value = '';
            renderTable(allAssets);
        }

        document.getElementById('search').addEventListener('input', applyFilters);
        document.getElementById('filter-status').addEventListener('change', applyFilters);
        document.getElementById('filter-category').addEventListener('change', applyFilters);

        function openAddModal() {
            document.getElementById('modal-title').textContent = 'Add Asset';
            document.getElementById('asset-id').value = '';
            ['f-name', 'f-serial', 'f-model', 'f-notes'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('f-status').value = 'active';
            document.getElementById('f-category').value = '';
            document.getElementById('f-location').value = '';
            document.getElementById('f-purchase').value = '';
            document.getElementById('modal-error').classList.add('d-none');
            new bootstrap.Modal(document.getElementById('assetModal')).show();
        }

        function openEditModal(id) {
            const a = allAssets.find(x => x.id === id);
            if (!a) return;
            document.getElementById('modal-title').textContent = 'Edit Asset';
            document.getElementById('asset-id').value = a.id;
            document.getElementById('f-name').value = a.name;
            document.getElementById('f-serial').value = a.serial_number || '';
            document.getElementById('f-model').value = a.model || '';
            document.getElementById('f-status').value = a.status;
            document.getElementById('f-category').value = a.category_id || '';
            document.getElementById('f-location').value = a.location_id || '';
            document.getElementById('f-purchase').value = a.purchase_date ? a.purchase_date.split('T')[0] : '';
            document.getElementById('f-notes').value = a.notes || '';
            document.getElementById('modal-error').classList.add('d-none');
            new bootstrap.Modal(document.getElementById('assetModal')).show();
        }

        async function saveAsset() {
            const id = document.getElementById('asset-id').value;
            const body = {
                name: document.getElementById('f-name').value.trim(),
                serial_number: document.getElementById('f-serial').value.trim(),
                model: document.getElementById('f-model').value.trim(),
                status: document.getElementById('f-status').value,
                category_id: document.getElementById('f-category').value || null,
                location_id: document.getElementById('f-location').value || null,
                purchase_date: document.getElementById('f-purchase').value || null,
                notes: document.getElementById('f-notes').value.trim(),
            };

            if (!body.name) {
                document.getElementById('modal-error').textContent = 'Asset name is required';
                document.getElementById('modal-error').classList.remove('d-none');
                return;
            }

            try {
                const res = await apiFetch(id ? `/assets/${id}` : '/assets', {
                    method: id ? 'PATCH' : 'POST',
                    body: JSON.stringify(body)
                });
                if (!res.ok) {
                    const err = await res.json();
                    document.getElementById('modal-error').textContent = err.error;
                    document.getElementById('modal-error').classList.remove('d-none');
                    return;
                }
                bootstrap.Modal.getInstance(document.getElementById('assetModal')).hide();
                await loadAssets();
            } catch (err) {
                document.getElementById('modal-error').textContent = 'Server error';
                document.getElementById('modal-error').classList.remove('d-none');
            }
        }

        function openDeleteModal(id) {
            deleteId = id;
            new bootstrap.Modal(document.getElementById('deleteModal')).show();
        }

        async function confirmDelete() {
            if (!deleteId) return;
            await apiFetch(`/assets/${deleteId}`, { method: 'DELETE' });
            bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
            await loadAssets();
            deleteId = null;
        }

        loadMeta();
        loadAssets();
    </script>
</body>

</html>
