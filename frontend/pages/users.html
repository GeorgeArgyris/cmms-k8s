<script>
    if (!sessionStorage.getItem('cmms_token')) {
        window.location.replace('../index.html');
    }
</script>
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMMS — Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../css/main.css" rel="stylesheet">
</head>

<body data-page="users">
    <div class="page-wrapper">

        <!-- SIDEBAR -->
        <div id="sidebar-container"></div>

        <!-- MAIN -->
        <div class="d-flex flex-column flex-grow-1">
            <div class="topbar">
                <span class="page-title">Users</span>
                <button class="btn btn-primary btn-sm" onclick="openAddModal()">
                    <i class="bi bi-person-plus me-1"></i> Add User
                </button>
            </div>

            <div class="page-content">
                <div class="cmms-card p-3">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span style="font-size:13px;color:#6c757d" id="user-count">Loading...</span>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-dark-cmms table-hover align-middle mb-0">
                            <thead>
                                <tr style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#6c757d">
                                    <th class="border-0 pb-2">User</th>
                                    <th class="border-0 pb-2">Email</th>
                                    <th class="border-0 pb-2">Role</th>
                                    <th class="border-0 pb-2">Status</th>
                                    <th class="border-0 pb-2">Joined</th>
                                    <th class="border-0 pb-2">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="users-body" style="font-size:13px">
                                <tr>
                                    <td colspan="6" class="text-center py-4" style="color:#6c757d">Loading...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ADD USER MODAL -->
    <div class="modal fade" id="userModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title text-white" id="modal-title">Add User</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="user-id">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label" style="font-size:12px;color:#adb5bd">Full Name *</label>
                            <input type="text" id="f-name" class="form-control" placeholder="John Technician">
                        </div>
                        <div class="col-12">
                            <label class="form-label" style="font-size:12px;color:#adb5bd">Email *</label>
                            <input type="email" id="f-email" class="form-control" placeholder="john@cmms.dev">
                        </div>
                        <div class="col-md-6" id="password-field">
                            <label class="form-label" style="font-size:12px;color:#adb5bd">Password *</label>
                            <input type="password" id="f-password" class="form-control" placeholder="Min 8 characters">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" style="font-size:12px;color:#adb5bd">Role</label>
                            <select id="f-role" class="form-select">
                                <option value="technician">Technician</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                        <div class="col-md-6" id="active-field" style="display:none">
                            <label class="form-label" style="font-size:12px;color:#adb5bd">Status</label>
                            <select id="f-active" class="form-select">
                                <option value="true">Active</option>
                                <option value="false">Inactive</option>
                            </select>
                        </div>
                    </div>
                    <div id="modal-error" class="alert alert-danger mt-3 d-none"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-sm" style="background:#2d3139;color:#adb5bd"
                        data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary btn-sm" onclick="saveUser()">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        requireAuth();
        loadSidebarComponent();

        // Redirect if not admin
        const me = getUser();
        if (me?.role !== 'admin') window.location.href = 'dashboard.html';

        let allUsers = [];

        function roleBadge(r) {
            return r === 'admin'
                ? `<span class="badge rounded-pill px-2" style="background:#1a2a5c;color:#93c5fd;font-size:11px">Admin</span>`
                : `<span class="badge rounded-pill px-2" style="background:#2d3139;color:#adb5bd;font-size:11px">Technician</span>`;
        }

        async function loadUsers() {
            try {
                const res = await apiFetch('/users');
                if (!res.ok) { window.location.href = 'dashboard.html'; return; }
                allUsers = await res.json();
                renderTable(allUsers);
            } catch {
                document.getElementById('users-body').innerHTML =
                    `<tr><td colspan="6" class="text-center py-4 text-danger">Failed to load users</td></tr>`;
            }
        }

        function renderTable(users) {
            document.getElementById('user-count').textContent = `${users.length} user${users.length !== 1 ? 's' : ''}`;
            const tbody = document.getElementById('users-body');
            if (!users.length) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4" style="color:#6c757d">No users found</td></tr>`;
                return;
            }
            tbody.innerHTML = users.map(u => `
      <tr>
        <td>
          <div class="d-flex align-items-center gap-2">
            <div class="rounded-circle bg-primary d-flex align-items-center justify-content-center text-white fw-bold"
                 style="width:32px;height:32px;font-size:13px;flex-shrink:0">${u.name.charAt(0).toUpperCase()}</div>
            <div class="fw-semibold text-white">${u.name}</div>
          </div>
        </td>
        <td style="color:#adb5bd">${u.email}</td>
        <td>${roleBadge(u.role)}</td>
        <td>
          ${u.is_active
                    ? `<span class="badge rounded-pill px-2" style="background:#0d2d1a;color:#34d399;font-size:11px">Active</span>`
                    : `<span class="badge rounded-pill px-2" style="background:#2a1a1a;color:#f87171;font-size:11px">Inactive</span>`
                }
        </td>
        <td style="font-size:12px;color:#6c757d">${new Date(u.created_at).toLocaleDateString('en-GB')}</td>
        <td>
          <button class="btn btn-sm" style="background:#2d3139;color:#adb5bd;font-size:12px" onclick="openEditModal(${u.id})">
            <i class="bi bi-pencil"></i>
          </button>
        </td>
      </tr>
    `).join('');
        }

        function openAddModal() {
            document.getElementById('modal-title').textContent = 'Add User';
            document.getElementById('user-id').value = '';
            document.getElementById('f-name').value = '';
            document.getElementById('f-email').value = '';
            document.getElementById('f-password').value = '';
            document.getElementById('f-role').value = 'technician';
            document.getElementById('password-field').style.display = '';
            document.getElementById('active-field').style.display = 'none';
            document.getElementById('f-email').disabled = false;
            document.getElementById('modal-error').classList.add('d-none');
            new bootstrap.Modal(document.getElementById('userModal')).show();
        }

        function openEditModal(id) {
            const u = allUsers.find(x => x.id === id);
            if (!u) return;
            document.getElementById('modal-title').textContent = 'Edit User';
            document.getElementById('user-id').value = u.id;
            document.getElementById('f-name').value = u.name;
            document.getElementById('f-email').value = u.email;
            document.getElementById('f-role').value = u.role;
            document.getElementById('f-active').value = String(u.is_active);
            document.getElementById('password-field').style.display = 'none';
            document.getElementById('active-field').style.display = '';
            document.getElementById('f-email').disabled = true;
            document.getElementById('modal-error').classList.add('d-none');
            new bootstrap.Modal(document.getElementById('userModal')).show();
        }

        async function saveUser() {
            const id = document.getElementById('user-id').value;
            const errBox = document.getElementById('modal-error');
            errBox.classList.add('d-none');

            if (id) {
                // Edit existing
                const body = {
                    name: document.getElementById('f-name').value.trim(),
                    role: document.getElementById('f-role').value,
                    is_active: document.getElementById('f-active').value === 'true'
                };
                if (!body.name) { errBox.textContent = 'Name is required'; errBox.classList.remove('d-none'); return; }
                try {
                    const res = await apiFetch(`/users/${id}`, { method: 'PATCH', body: JSON.stringify(body) });
                    if (!res.ok) { const e = await res.json(); errBox.textContent = e.error; errBox.classList.remove('d-none'); return; }
                    bootstrap.Modal.getInstance(document.getElementById('userModal')).hide();
                    await loadUsers();
                } catch { errBox.textContent = 'Server error'; errBox.classList.remove('d-none'); }
            } else {
                // Create new
                const body = {
                    name: document.getElementById('f-name').value.trim(),
                    email: document.getElementById('f-email').value.trim(),
                    password: document.getElementById('f-password').value,
                    role: document.getElementById('f-role').value
                };
                if (!body.name || !body.email || !body.password) {
                    errBox.textContent = 'Name, email and password are required';
                    errBox.classList.remove('d-none'); return;
                }
                try {
                    const res = await apiFetch('/users', { method: 'POST', body: JSON.stringify(body) });
                    if (!res.ok) { const e = await res.json(); errBox.textContent = e.error; errBox.classList.remove('d-none'); return; }
                    bootstrap.Modal.getInstance(document.getElementById('userModal')).hide();
                    await loadUsers();
                } catch { errBox.textContent = 'Server error'; errBox.classList.remove('d-none'); }
            }
        }

        loadUsers();
    </script>
</body>

</html>
