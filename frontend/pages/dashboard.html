<script>
    if (!sessionStorage.getItem('cmms_token')) {
        window.location.replace('../index.html');
    }
</script>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMMS — Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../css/main.css" rel="stylesheet">
</head>

<body data-page="dashboard">

    <div class="page-wrapper">

        <!-- SIDEBAR -->
        <div id="sidebar-container"></div>

        <!-- MAIN -->
        <div class="d-flex flex-column flex-grow-1">

            <!-- TOPBAR -->
            <div class="topbar">
                <span class="page-title">Dashboard</span>
                <span style="font-size:13px;color:#6c757d" id="topbar-date"></span>
            </div>

            <!-- CONTENT -->
            <div class="page-content">

                <!-- STAT CARDS -->
                <div class="row g-3 mb-4">
                    <div class="col-sm-6 col-xl-3">
                        <div class="stat-card">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <div class="stat-label">Total Assets</div>
                                    <div class="stat-val text-white mt-2" id="stat-assets">—</div>
                                </div>
                                <div class="rounded-3 d-flex align-items-center justify-content-center"
                                    style="width:44px;height:44px;background:#1e3a5f">
                                    <i class="bi bi-boxes text-primary fs-5"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-6 col-xl-3">
                        <div class="stat-card">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <div class="stat-label">Open Work Orders</div>
                                    <div class="stat-val text-warning mt-2" id="stat-open">—</div>
                                </div>
                                <div class="rounded-3 d-flex align-items-center justify-content-center"
                                    style="width:44px;height:44px;background:#3a2a00">
                                    <i class="bi bi-wrench-adjustable text-warning fs-5"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-6 col-xl-3">
                        <div class="stat-card">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <div class="stat-label">Overdue</div>
                                    <div class="stat-val text-danger mt-2" id="stat-overdue">—</div>
                                </div>
                                <div class="rounded-3 d-flex align-items-center justify-content-center"
                                    style="width:44px;height:44px;background:#3a0a0a">
                                    <i class="bi bi-exclamation-triangle text-danger fs-5"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-6 col-xl-3">
                        <div class="stat-card">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <div class="stat-label">Completed Today</div>
                                    <div class="stat-val text-success mt-2" id="stat-done">—</div>
                                </div>
                                <div class="rounded-3 d-flex align-items-center justify-content-center"
                                    style="width:44px;height:44px;background:#0d2d1a">
                                    <i class="bi bi-check-circle text-success fs-5"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row g-3">

                    <!-- RECENT WORK ORDERS -->
                    <div class="col-xl-8">
                        <div class="cmms-card p-3 h-100">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h6 class="fw-bold text-white mb-0">Recent Work Orders</h6>
                                <a href="work-orders.html" class="btn btn-sm"
                                    style="background:#2d3139;color:#adb5bd;font-size:12px">View all</a>
                            </div>
                            <div class="table-responsive">
                                <table class="table table-dark-cmms table-hover align-middle mb-0">
                                    <thead>
                                        <tr
                                            style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#6c757d">
                                            <th class="border-0 pb-2">Title</th>
                                            <th class="border-0 pb-2">Asset</th>
                                            <th class="border-0 pb-2">Priority</th>
                                            <th class="border-0 pb-2">Status</th>
                                            <th class="border-0 pb-2">Due</th>
                                        </tr>
                                    </thead>
                                    <tbody id="recent-wo-body" style="font-size:13px">
                                        <tr>
                                            <td colspan="5" class="text-center py-4" style="color:#6c757d">Loading...
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- STATUS BREAKDOWN -->
                    <div class="col-xl-4">
                        <div class="cmms-card p-3 mb-3">
                            <h6 class="fw-bold text-white mb-3">Work Orders by Status</h6>
                            <div id="status-breakdown">
                                <div class="text-center py-3" style="color:#6c757d;font-size:13px">Loading...</div>
                            </div>
                        </div>

                        <!-- QUICK ACTIONS -->
                        <div class="cmms-card p-3">
                            <h6 class="fw-bold text-white mb-3">Quick Actions</h6>
                            <div class="d-grid gap-2">
                                <a href="work-orders.html?new=1" class="btn btn-primary btn-sm">
                                    <i class="bi bi-plus-circle me-1"></i> New Work Order
                                </a>
                                <a href="assets.html" class="btn btn-sm" style="background:#2d3139;color:#adb5bd">
                                    <i class="bi bi-boxes me-1"></i> View Assets
                                </a>
                                <a href="schedule.html" class="btn btn-sm" style="background:#2d3139;color:#adb5bd">
                                    <i class="bi bi-calendar3 me-1"></i> View Schedule
                                </a>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        requireAuth();
        loadSidebarComponent();

        // Show today's date in topbar
        document.getElementById('topbar-date').textContent =
            new Date().toLocaleDateString('en-GB', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        const statusColors = {
            open: { bg: '#1a3a5c', color: '#60a5fa', label: 'Open' },
            in_progress: { bg: '#3a2a00', color: '#fbbf24', label: 'In Progress' },
            done: { bg: '#0d2d1a', color: '#34d399', label: 'Done' },
            cancelled: { bg: '#2a1a1a', color: '#f87171', label: 'Cancelled' }
        };

        const priorityColors = {
            critical: { bg: '#3a0a0a', color: '#f87171' },
            high: { bg: '#3a2a00', color: '#fbbf24' },
            medium: { bg: '#1a2a3a', color: '#60a5fa' },
            low: { bg: '#1a2a1a', color: '#6ee7b7' }
        };

        function statusBadge(status) {
            const s = statusColors[status] || { bg: '#2d3139', color: '#adb5bd', label: status };
            return `<span class="badge rounded-pill px-2" style="background:${s.bg};color:${s.color};font-size:11px">${s.label || status}</span>`;
        }

        function priorityBadge(priority) {
            const p = priorityColors[priority] || { bg: '#2d3139', color: '#adb5bd' };
            return `<span class="badge rounded-pill px-2" style="background:${p.bg};color:${p.color};font-size:11px">${priority}</span>`;
        }

        function formatDate(d) {
            if (!d) return '—';
            const date = new Date(d);
            const today = new Date();
            const diff = Math.ceil((date - today) / (1000 * 60 * 60 * 24));
            const str = date.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
            if (diff < 0) return `<span class="text-danger">${str} (overdue)</span>`;
            if (diff === 0) return `<span class="text-warning">${str} (today)</span>`;
            return str;
        }

        async function loadDashboard() {
            try {
                const res = await apiFetch('/dashboard');
                const data = await res.json();

                // Stat cards
                document.getElementById('stat-assets').textContent = data.total_assets;
                document.getElementById('stat-open').textContent = data.open_work_orders;
                document.getElementById('stat-overdue').textContent = data.overdue;

                // Completed today
                const done = data.by_status.find(s => s.status === 'done');
                document.getElementById('stat-done').textContent = done ? done.count : 0;

                // Recent work orders table
                const tbody = document.getElementById('recent-wo-body');
                if (!data.recent_work_orders.length) {
                    tbody.innerHTML = `<tr><td colspan="5" class="text-center py-4" style="color:#6c757d">No work orders yet</td></tr>`;
                } else {
                    tbody.innerHTML = data.recent_work_orders.map(wo => `
          <tr style="cursor:pointer" onclick="window.location='work-orders.html'">
            <td class="text-white">${wo.title}</td>
            <td style="color:#adb5bd">${wo.asset_name || '—'}</td>
            <td>${priorityBadge(wo.priority)}</td>
            <td>${statusBadge(wo.status)}</td>
            <td style="color:#adb5bd;font-size:12px">${formatDate(wo.due_date)}</td>
          </tr>
        `).join('');
                }

                // Status breakdown
                const breakdown = document.getElementById('status-breakdown');
                const total = data.by_status.reduce((a, b) => a + parseInt(b.count), 0);
                if (!total) {
                    breakdown.innerHTML = `<div class="text-center py-2" style="color:#6c757d;font-size:13px">No data yet</div>`;
                } else {
                    breakdown.innerHTML = data.by_status.map(s => {
                        const sc = statusColors[s.status] || { bg: '#2d3139', color: '#adb5bd', label: s.status };
                        const pct = Math.round((parseInt(s.count) / total) * 100);
                        return `
            <div class="mb-3">
              <div class="d-flex justify-content-between mb-1">
                <span style="font-size:13px;color:#adb5bd">${sc.label || s.status}</span>
                <span style="font-size:13px;color:#6c757d">${s.count}</span>
              </div>
              <div class="progress" style="height:6px;background:#2d3139;border-radius:99px">
                <div class="progress-bar" style="width:${pct}%;background:${sc.color};border-radius:99px"></div>
              </div>
            </div>
          `;
                    }).join('');
                }

            } catch (err) {
                console.error('Dashboard load error:', err);
            }
        }

        loadDashboard();
    </script>
</body>

</html>
