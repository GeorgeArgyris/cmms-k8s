<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMMS — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/main.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>

<body>
    <div class="login-card cmms-card p-4 p-md-5">
        <div class="text-center mb-4">
            <div class="fw-bold text-uppercase" style="font-size:11px;letter-spacing:.12em;color:#6c757d">CMMS</div>
            <h1 class="fs-3 fw-bold text-white mt-1">Sign in</h1>
            <p style="font-size:13px;color:#6c757d">Maintenance Management System</p>
        </div>

        <div id="login-error" class="alert alert-danger d-none" role="alert"></div>

        <div class="mb-3">
            <label class="form-label" style="font-size:13px;color:#adb5bd">Email</label>
            <input type="email" id="email" class="form-control" placeholder="admin@cmms.dev">
        </div>
        <div class="mb-4">
            <label class="form-label" style="font-size:13px;color:#adb5bd">Password</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••">
        </div>

        <button id="login-btn" class="btn btn-primary w-100 fw-semibold" onclick="doLogin()">
            Sign in
        </button>

        <p class="text-center mt-4" style="font-size:12px;color:#4a5568">
            Demo: admin@cmms.dev / password
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API = '/api';

        // Already logged in — go to dashboard
        if (sessionStorage.getItem('cmms_token')) {
            window.location.href = '/pages/dashboard.html';
        }

        async function doLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const errBox = document.getElementById('login-error');

            errBox.classList.add('d-none');
            btn.disabled = true;
            btn.textContent = 'Signing in...';

            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (!res.ok) {
                    errBox.textContent = data.error || 'Login failed';
                    errBox.classList.remove('d-none');
                    return;
                }

                sessionStorage.setItem('cmms_token', data.token);
                sessionStorage.setItem('cmms_user', JSON.stringify(data.user));
                window.location.href = '/pages/dashboard.html';

            } catch {
                errBox.textContent = 'Cannot reach server. Is the backend running?';
                errBox.classList.remove('d-none');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Sign in';
            }
        }

        // Allow Enter key
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') doLogin();
        });
    </script>
</body>

</html>
