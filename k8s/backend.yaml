apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: cmms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
      annotations:                          # ← ADDED
        prometheus.io/scrape: "true"        # ← ADDED
        prometheus.io/port: "3000"          # ← ADDED
        prometheus.io/path: "/metrics"      # ← ADDED
    spec:
      containers:
      - name: backend
        image: cmms-backend:latest
        imagePullPolicy: Never
        env:
        - name: DB_HOST
          value: postgres-service
        - name: PORT
          value: "3000"
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_DB
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_USER
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: JWT_SECRET
        ports:
        - containerPort: 3000
          name: http                       
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: cmms
  labels:
    app: backend                            
spec:
  type: NodePort
  selector:
    app: backend
  ports:
  - name: http                             
    port: 3000
    targetPort: 3000
    nodePort: 30300