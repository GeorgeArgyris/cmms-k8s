apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cmms-backend
  namespace: monitoring              
  labels:
    release: kube-prometheus-stack   
spec:
  namespaceSelector:
    matchNames:
      - cmms                         
  selector:
    matchLabels:
      app: backend                   
  endpoints:
    - port: http                    
      path: /metrics
      interval: 30s                  
      scrapeTimeout: 10s