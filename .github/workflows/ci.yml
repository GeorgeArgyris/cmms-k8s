name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services: 
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: cmmsuser
          POSTGRES_PASSWORD: cmmspass
          POSTGRES_DB: cmmsdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U cmmsuser"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5


    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install
        run: npm ci

      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -U cmmsuser; do
            sleep 1
          done

      - name: Health check — app loads without crashing
        run: node -e "require('./src/app'); console.log('App loaded successfully');"
        env:
          JWT_SECRET: ci-placeholder
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: cmmsdb
          DB_USER: cmmsuser
          DB_PASS: cmmspass

      - name: Run tests
        run: npm test
        env:
          JWT_SECRET: test-secret
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: cmmsdb
          DB_USER: cmmsuser
          DB_PASS: cmmspass