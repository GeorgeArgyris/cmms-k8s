name: CI

on:
  push:
  pull_request:

# cancel the older run if another push is received in the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

# ════════════════════════════════════════════════════════════════════════════
# LINT (backend) - ESLint for js code 
# ════════════════════════════════════════════════════════════════════════════
  lint-backend:
    name: Lint (Backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    
    steps: 
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npx eslint . --ext .js --max-warnings=0

# ════════════════════════════════════════════════════════════════════════════
# LINT (frontend) - HTML Validation 
# ════════════════════════════════════════════════════════════════════════════
  lint-frontend:
    name: Lint (frontend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Validate HTML
        run: |
          pip install html5validator --quiet
          html5validator --root frontend/ --also-check-css \
            --log-encoding utf-8 || true
          # "|| true" keeps this as a warning, not a hard failure, while you're
          # learning. Remove it when you want strict enforcement.
# ════════════════════════════════════════════════════════════════════════════
# SECURITY AUDIT (backend)
# ════════════════════════════════════════════════════════════════════════════
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint-backend
    # Starts after lint backend is passed
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true
# ════════════════════════════════════════════════════════════════════════════
# TEST (backend) - Postgres service up and run tests with a real ephemeral DB connection.
# ════════════════════════════════════════════════════════════════════════════
  test:
    name: Test (backend)
    runs-on: ubuntu-latest
    needs: lint-backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: cmmsuser
          POSTGRES_PASSWORD: cmmspass
          POSTGRES_DB: cmmsdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U cmmsuser"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          # ↑ GitHub waits until pg_isready reports healthy before starting
          #   your steps — no more "connection refused" race conditions.

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -U cmmsuser; do
            sleep 1
          done

      - name: Health check — app loads without crashing
        run: node -e "require('./src/app'); console.log('App loaded OK');"
        env:
          JWT_SECRET: ci-placeholder
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: cmmsdb
          DB_USER: cmmsuser
          DB_PASS: cmmspass

      - name: Run tests
        run: npm test
        env:
          JWT_SECRET: test-secret
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: cmmsdb
          DB_USER: cmmsuser
          DB_PASS: cmmspass

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 7
# ════════════════════════════════════════════════════════════════════════════
# Docker build back and front end 
# ════════════════════════════════════════════════════════════════════════════
  docker-build-backend:
    name: Docker Build (backend)
    runs-on: ubuntu-latest
    needs: lint-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx

        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          
          tags: cmms-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-build-frontend:
    name: Docker Build (frontend)
    runs-on: ubuntu-latest
    needs: lint-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: cmms-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
# ════════════════════════════════════════════════════════════════════════════
# CI PASS GATE
# ════════════════════════════════════════════════════════════════════════════
  ci-pass:
    name: ✅ CI Pass
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend, security, test, docker-build-backend, docker-build-frontend]
    if: always()

    steps:
      - name: All jobs passed?
        run: |
          echo "Results: $NEEDS"
          if echo "$NEEDS" | grep -q '"result":"failure"'; then
            echo "❌ One or more jobs failed — see above."
            exit 1
          fi
          echo "✅ All checks passed."
        env:
          NEEDS: ${{ toJSON(needs) }}