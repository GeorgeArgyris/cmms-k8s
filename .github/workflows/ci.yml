name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install
        run: npm ci

      - name: Health check — app loads without crashing
        run: node -e "require('./src/app'); console.log('App loaded successfully');"
        env:
          JWT_SECRET: ci-placeholder
          DB_HOST: localhost

      - name: Run tests
        run: npm test